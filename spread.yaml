project: nginx-ingress-integrator
path: /home/ubuntu/nginx-ingress-integrator
kill-timeout: 60m
warn-timeout: 1m

backends:
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04-juju3:
          environment:
            CONCIERGE: concierge-juju3-microk8s.yaml
      - ubuntu-24.04-juju3-arm64:
          runner: [self-hosted, arm64, large]
          arch: arm64
          environment:
            CONCIERGE: concierge-juju3-microk8s.yaml
      - ubuntu-24.04-juju2:
          environment:
            CONCIERGE: concierge-juju2-microk8s.yaml
            TOX_ENV: integration-juju2

environment:
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'

exclude:
  - .git
  - .tox
  - .venv
  - .*_cache

integration-suites:
  tests/integration/:
    cwd: ./
    summary: integration tests
    backends:
      - integration-test
    environment:
      # test_cert_relation is not supported on juju 2.9
      MODULE/test_cert_relation/ubuntu-24.04-juju2: _skip
    pytest-arguments-template: |
      {% if arch == "arm64" %}--model-arch=arm64{% endif %}
